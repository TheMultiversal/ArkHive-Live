<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ff4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="180" fill="url(#glow)"/>
  <rect y="300" width="400" height="100" fill="url(#bottomFade)"/>
  
  <!-- Grid -->
  <g opacity="0.035" stroke="#ff4444" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="20" y1="0" x2="20" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/><line x1="60" y1="0" x2="60" y2="400"/><line x1="80" y1="0" x2="80" y2="400"/><line x1="100" y1="0" x2="100" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/><line x1="140" y1="0" x2="140" y2="400"/><line x1="160" y1="0" x2="160" y2="400"/><line x1="180" y1="0" x2="180" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/><line x1="220" y1="0" x2="220" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/><line x1="260" y1="0" x2="260" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="340" y1="0" x2="340" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/><line x1="380" y1="0" x2="380" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="0" y1="0" x2="400" y2="0"/><line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/><line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/><line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="200" x2="400" y2="200"/><line x1="0" y1="220" x2="400" y2="220"/><line x1="0" y1="240" x2="400" y2="240"/><line x1="0" y1="260" x2="400" y2="260"/><line x1="0" y1="280" x2="400" y2="280"/><line x1="0" y1="300" x2="400" y2="300"/><line x1="0" y1="320" x2="400" y2="320"/><line x1="0" y1="340" x2="400" y2="340"/><line x1="0" y1="360" x2="400" y2="360"/><line x1="0" y1="380" x2="400" y2="380"/><line x1="0" y1="400" x2="400" y2="400"/>
  </g>
  
  <!-- Scan line -->
  <rect x="0" y="215" width="400" height="1" fill="#ff4444" opacity="0.06"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="400" height="2" fill="#ff4444" opacity="0.5"/>
  
  <!-- Investigation theme icon (background) -->
  <path d="M140 240 L140 180 L170 180 L170 240 M185 240 L185 160 L215 160 L215 240 M230 240 L230 140 L260 140 L260 240" fill="none" stroke="#ff4444" stroke-width="2" opacity="0.12"/>
  
  <!-- Large initials -->
  <text x="200" y="195" font-family="'Courier New',monospace" font-size="110" font-weight="900" fill="#ff4444" opacity="0.08" text-anchor="middle" dominant-baseline="central" letter-spacing="12">RW</text>
  
  <!-- Person silhouette -->
  <circle cx="200" cy="150" r="40" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.25"/>
  <path d="M200 195 C165 195 138 213 133 245 L267 245 C262 213 235 195 200 195Z" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.25"/>
  
  <!-- Status indicator -->
  <rect x="15" y="15" width="96" height="22" fill="#22c55e" opacity="0.15"/>
  <rect x="15" y="15" width="3" height="22" fill="#22c55e" opacity="0.6"/>
  <text x="28" y="30" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#22c55e" opacity="0.8" letter-spacing="1.5">ACQUITTED</text>
  
  <!-- Name -->
  <text x="200" y="295" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#ff4444" opacity="0.75" text-anchor="middle" letter-spacing="2">RICHARD WIGTON</text>
  
  <!-- Role -->
  <text x="200" y="318" font-family="'Helvetica Neue',Arial,sans-serif" font-size="8" fill="#ff4444" opacity="0.35" text-anchor="middle" letter-spacing="0.5">Head of arbitrage at Kidder, Peabody</text>
  
  <!-- Investigation label -->
  <text x="200" y="345" font-family="'Courier New',monospace" font-size="8" fill="#ff4444" opacity="0.3" text-anchor="middle" letter-spacing="3">FINANCIAL CRIME</text>
  
  <!-- Corner brackets -->
  <polyline points="0,20 0,0 20,0" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.2"/>
  <polyline points="380,0 400,0 400,20" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.2"/>
  <polyline points="0,380 0,400 20,400" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.2"/>
  <polyline points="380,400 400,400 400,380" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.2"/>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="398" width="400" height="2" fill="#ff4444" opacity="0.25"/>
  
  <!-- Diagonal corner cuts -->
  <line x1="0" y1="12" x2="12" y2="0" stroke="#ff4444" stroke-width="0.5" opacity="0.15"/>
  <line x1="388" y1="0" x2="400" y2="12" stroke="#ff4444" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="388" x2="12" y2="400" stroke="#ff4444" stroke-width="0.5" opacity="0.15"/>
  <line x1="388" y1="400" x2="400" y2="388" stroke="#ff4444" stroke-width="0.5" opacity="0.15"/>
</svg>